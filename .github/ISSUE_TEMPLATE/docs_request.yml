name: Documentation request
description: Report confusing, missing, or stale docs.
title: "[docs] "
labels:
  - type:docs-drift
  - area:docs
body:
  - type: textarea
    id: page
    attributes:
      label: Page or section
      placeholder: README.md, docs/README.md, docs/configuration.md
    validations:
      required: true
  - type: textarea
    id: confusion
    attributes:
      label: What is confusing or missing?
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What should the docs explain instead?
  - type: textarea
    id: context
    attributes:
      label: User context
      placeholder: New user, contributor, release maintainer, client integration author...
