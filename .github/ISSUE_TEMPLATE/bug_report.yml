name: Bug report
description: Report a reproducible MCPace bug.
title: "bug: "
labels: [type:bug]
body:
  - type: textarea
    id: summary
    attributes:
      label: What happened?
      description: Include the command, platform, expected result, and actual result.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: MCPace version
      placeholder: mcpace 0.6.9
  - type: dropdown
    id: os
    attributes:
      label: Operating system
      options:
        - Windows
        - macOS
        - Linux
        - Other
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or error output
      render: text
  - type: textarea
    id: validation
    attributes:
      label: Checks tried
      description: For source builds, useful checks are npm run check, npm run pack:npm:dry-run, npm run release:dry-run, and cargo test.
      render: text
