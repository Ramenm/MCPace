name: Feature request
description: Suggest a focused improvement.
title: "feat: "
labels: [type:enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Keep the solution narrow and mention any Windows or MCP stdio impact.
    validations:
      required: true
  - type: textarea
    id: validation
    attributes:
      label: Validation idea
      description: What command or test should prove this works?
