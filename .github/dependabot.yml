version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    open-pull-requests-limit: 5
    schedule:
      interval: weekly
    labels:
      - type:enhancement
      - area:release

  - package-ecosystem: npm
    directory: /
    open-pull-requests-limit: 5
    schedule:
      interval: weekly
    labels:
      - type:enhancement
      - area:npm

  - package-ecosystem: cargo
    directory: /
    open-pull-requests-limit: 5
    schedule:
      interval: weekly
    labels:
      - type:enhancement
      - area:rust
