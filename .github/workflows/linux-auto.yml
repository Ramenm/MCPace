name: linux-auto

# Local CI is the default cost-control gate for this repository:
#   npm run check:ci
# GitHub-hosted Linux proof lanes stay manual-only to avoid paid Actions
# minutes on normal private-repo pushes/PRs.
on:
  workflow_dispatch:
    inputs:
      full:
        description: Run the full local CI proof rather than the fast check.
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: linux-auto-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux-auto-standard:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked Node tooling
        run: npm ci --ignore-scripts --no-audit --no-fund --omit=optional

      - name: Run Linux auto-check
        run: npm run check

      - name: Upload Linux auto-check report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-auto-check-standard
          path: reports/**
          if-no-files-found: ignore

  linux-clean-install-proof:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.full == true }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install locked Node tooling
        run: npm ci --ignore-scripts --no-audit --no-fund --omit=optional

      - name: Run full Linux auto-check
        run: npm run check:ci

      - name: Upload full Linux auto-check report
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: linux-auto-check-full
          path: reports/**
          if-no-files-found: ignore
