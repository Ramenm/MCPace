name: release-dry-run

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: release-dry-run-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-and-npm:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund --omit=optional
      - run: npm run check
      - run: npm run check:package
      - run: npm run build:release-artifacts
      - run: |
          node -e "require('node:fs').mkdirSync('dist/npm', { recursive: true })"
          npm pack --workspace @mcpace/cli --json --pack-destination dist/npm
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        with:
          name: release-dry-run
          path: dist/**
          if-no-files-found: error
