name: publish-npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish with --dry-run instead of publishing.
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          package-manager-cache: false

      - name: Verify exact npm version for trusted publishing
        run: npm exec --yes --package=npm@11.12.1 -- npm --version

      - name: Download npm tarballs from the matching GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          mkdir -p dist/npm
          gh release download "$GITHUB_REF_NAME" --dir dist/npm --pattern '*.tgz' --pattern 'SHA256SUMS.txt'

      - name: Verify downloaded npm tarballs against release checksums
        run: node scripts/verify-release-checksums.mjs --json --artifact-dir dist/npm

      - name: Inject exact GitHub repository metadata for trusted publishing
        run: node scripts/sync-platform-packages.mjs --json --repository-url "${{ github.server_url }}/${{ github.repository }}"

      - name: Validate source and publish contracts
        run: |
          npm test
          node scripts/verify-publish-readiness.mjs --json --repository-url "${{ github.server_url }}/${{ github.repository }}"

      - name: Publish prebuilt npm artifacts
        env:
          MCPACE_NPM_EXEC_PACKAGE: npm@11.12.1
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node scripts/publish-npm-artifacts.mjs --json --artifact-dir dist/npm --dry-run
          else
            node scripts/publish-npm-artifacts.mjs --json --artifact-dir dist/npm
          fi
