name: publish-npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish with --dry-run instead of publishing.
        required: false
        default: true
        type: boolean

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish:
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    timeout-minutes: 25
    environment: npm-publish
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install locked Node tooling
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Verify exact npm version for trusted publishing
        run: npm exec --yes --package=npm@11.13.0 -- npm --version

      - name: Validate source and publish contracts
        run: |
          npm run check
          npm run check:package
          npm run pack:npm:dry-run

      - name: Refuse incomplete native package publication
        run: node scripts/verify-npm-publish-contract.mjs --enforce

      - name: Publish main npm launcher
        working-directory: packages/npm/cli
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            npm exec --yes --package=npm@11.13.0 -- npm publish --dry-run --access public
          else
            npm exec --yes --package=npm@11.13.0 -- npm publish --access public
          fi
