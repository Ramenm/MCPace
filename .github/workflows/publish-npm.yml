name: publish-npm

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Run npm publish with --dry-run instead of publishing.
        required: false
        default: true
        type: boolean
      version_override:
        description: Stable x.y.z version to publish before source metadata is bumped.
        required: false
        default: ''
        type: string
  push:
    branches:
      - main
      - master
      - dev
    tags:
      - 'v*'

permissions:
  contents: read
  id-token: write

concurrency:
  group: publish-npm-${{ github.ref }}
  cancel-in-progress: false

jobs:
  publish-plan:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      package_name: ${{ steps.plan.outputs.package_name }}
      source_version: ${{ steps.plan.outputs.source_version }}
      base_version: ${{ steps.plan.outputs.base_version }}
      version_override: ${{ steps.plan.outputs.version_override }}
      effective_version: ${{ steps.plan.outputs.effective_version }}
      channel: ${{ steps.plan.outputs.channel }}
      dist_tag: ${{ steps.plan.outputs.dist_tag }}
      dry_run: ${{ steps.plan.outputs.dry_run }}
      already_published: ${{ steps.plan.outputs.already_published }}
      should_publish: ${{ steps.plan.outputs.should_publish }}
      reason: ${{ steps.plan.outputs.reason }}
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Plan npm publish channel
        id: plan
        env:
          MCPACE_PUBLISH_DRY_RUN: ${{ github.event_name == 'workflow_dispatch' && inputs.dry_run || 'false' }}
          MCPACE_VERSION_OVERRIDE: ${{ github.event_name == 'workflow_dispatch' && inputs.version_override || '' }}
        run: node scripts/plan-npm-publish.mjs --github-output

      - name: Show npm publish plan
        env:
          MCPACE_PACKAGE_NAME: ${{ steps.plan.outputs.package_name }}
          MCPACE_SOURCE_VERSION: ${{ steps.plan.outputs.source_version }}
          MCPACE_BASE_VERSION: ${{ steps.plan.outputs.base_version }}
          MCPACE_VERSION_OVERRIDE: ${{ steps.plan.outputs.version_override }}
          MCPACE_EFFECTIVE_VERSION: ${{ steps.plan.outputs.effective_version }}
          MCPACE_DIST_TAG: ${{ steps.plan.outputs.dist_tag }}
          MCPACE_SHOULD_PUBLISH: ${{ steps.plan.outputs.should_publish }}
          MCPACE_PLAN_REASON: ${{ steps.plan.outputs.reason }}
        run: |
          echo "package=$MCPACE_PACKAGE_NAME"
          echo "source-version=$MCPACE_SOURCE_VERSION"
          echo "base-version=$MCPACE_BASE_VERSION"
          echo "version-override=$MCPACE_VERSION_OVERRIDE"
          echo "version=$MCPACE_EFFECTIVE_VERSION"
          echo "dist-tag=$MCPACE_DIST_TAG"
          echo "should-publish=$MCPACE_SHOULD_PUBLISH"
          echo "reason=$MCPACE_PLAN_REASON"

  native-packages:
    if: needs.publish-plan.outputs.should_publish == 'true'
    needs: publish-plan
    name: native package / ${{ matrix.key }}
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 45
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: linux-x64-gnu
            platform: linux
            runner: ubuntu-24.04
            rust_target: x86_64-unknown-linux-gnu
            binary_name: mcpace
            glibc_baseline_image: ubuntu:22.04
          - key: linux-arm64-gnu
            platform: linux
            runner: ubuntu-24.04-arm
            rust_target: aarch64-unknown-linux-gnu
            binary_name: mcpace
            glibc_baseline_image: ubuntu:22.04
          - key: darwin-x64
            platform: darwin
            runner: macos-15-intel
            rust_target: x86_64-apple-darwin
            binary_name: mcpace
          - key: darwin-arm64
            platform: darwin
            runner: macos-15
            rust_target: aarch64-apple-darwin
            binary_name: mcpace
          - key: win32-x64-msvc
            platform: win32
            runner: windows-2025
            rust_target: x86_64-pc-windows-msvc
            binary_name: mcpace.exe
          - key: win32-arm64-msvc
            platform: win32
            runner: windows-11-arm
            rust_target: aarch64-pc-windows-msvc
            binary_name: mcpace.exe
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy

      - name: Install locked Node tooling
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Prepare effective npm release version
        env:
          MCPACE_RELEASE_VERSION: ${{ needs.publish-plan.outputs.effective_version }}
        run: node scripts/prepare-npm-release-version.mjs --version "$MCPACE_RELEASE_VERSION"
        shell: bash

      - name: Install Rust target
        if: matrix.platform != 'linux'
        env:
          MCPACE_RUST_TARGET: ${{ matrix.rust_target }}
        run: rustup target add "$MCPACE_RUST_TARGET"
        shell: bash

      - name: Check Rust formatting
        if: matrix.platform != 'linux'
        run: cargo fmt --check
        shell: bash

      - name: Check Rust target with clippy
        if: matrix.platform != 'linux'
        env:
          MCPACE_RUST_TARGET: ${{ matrix.rust_target }}
        run: cargo clippy --all-targets --target "$MCPACE_RUST_TARGET" -- -D warnings
        shell: bash

      - name: Test Rust target
        if: matrix.platform != 'linux'
        env:
          MCPACE_RUST_TARGET: ${{ matrix.rust_target }}
        run: cargo test --target "$MCPACE_RUST_TARGET" -- --test-threads=1
        shell: bash

      - name: Build and test Linux native binary in glibc baseline container
        if: matrix.platform == 'linux'
        env:
          MCPACE_RUST_TARGET: ${{ matrix.rust_target }}
          MCPACE_BINARY_NAME: ${{ matrix.binary_name }}
          MCPACE_GLIBC_BASELINE_IMAGE: ${{ matrix.glibc_baseline_image }}
          MCPACE_GLIBC_BASELINE_CHECKS: full
        run: bash scripts/build-linux-glibc-baseline.sh
        shell: bash

      - name: Build native binary
        if: matrix.platform != 'linux'
        env:
          MCPACE_RUST_TARGET: ${{ matrix.rust_target }}
        run: cargo build --release --target "$MCPACE_RUST_TARGET"
        shell: bash

      - name: Pack native npm package
        env:
          MCPACE_TARGET_KEY: ${{ matrix.key }}
          MCPACE_RUST_TARGET: ${{ matrix.rust_target }}
          MCPACE_BINARY_NAME: ${{ matrix.binary_name }}
        run: |
          set -euo pipefail
          binary="target/${MCPACE_RUST_TARGET}/release/${MCPACE_BINARY_NAME}"
          node scripts/build-native-npm-package.mjs --target "$MCPACE_TARGET_KEY" --binary "$binary" --out-dir dist/npm --json
        shell: bash

      - name: Upload native npm tarball
        uses: actions/upload-artifact@v7
        with:
          name: native-package-${{ matrix.key }}
          path: dist/npm/*.tgz
          if-no-files-found: error

  publish:
    if: needs.publish-plan.outputs.should_publish == 'true'
    needs:
      - publish-plan
      - native-packages
    runs-on: ubuntu-latest
    timeout-minutes: 30
    environment: npm-publish
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install locked Node tooling
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Prepare effective npm release version
        env:
          MCPACE_RELEASE_VERSION: ${{ needs.publish-plan.outputs.effective_version }}
        run: node scripts/prepare-npm-release-version.mjs --version "$MCPACE_RELEASE_VERSION"
        shell: bash

      - name: Verify exact npm version for trusted publishing
        run: npm exec --yes --package=npm@11.13.0 -- npm --version

      - name: Validate source and launcher package
        run: |
          npm run check
          npm run check:package
          npm run pack:npm:dry-run

      - name: Download native package artifacts
        uses: actions/download-artifact@v8
        with:
          pattern: native-package-*
          path: dist/npm
          merge-multiple: true

      - name: Refuse incomplete native package publication
        run: node scripts/verify-npm-publish-contract.mjs --enforce

      - name: Publish native npm packages
        env:
          MCPACE_PUBLISH_DRY_RUN: ${{ needs.publish-plan.outputs.dry_run }}
          MCPACE_NPM_DIST_TAG: ${{ needs.publish-plan.outputs.dist_tag }}
        run: |
          set -euo pipefail
          shopt -s nullglob
          tarballs=(dist/npm/*.tgz)
          if [ "${#tarballs[@]}" -ne 6 ]; then
            echo "expected 6 native npm tarballs, found ${#tarballs[@]}" >&2
            exit 1
          fi
          dry_run_args=()
          if [ "$MCPACE_PUBLISH_DRY_RUN" = "true" ]; then
            dry_run_args=(--dry-run)
          fi
          for tarball in "${tarballs[@]}"; do
            npm exec --yes --package=npm@11.13.0 -- npm publish "$tarball" "${dry_run_args[@]}" --access public --tag "$MCPACE_NPM_DIST_TAG" --provenance
          done

      - name: Publish main npm launcher
        working-directory: packages/npm/cli
        env:
          MCPACE_PUBLISH_DRY_RUN: ${{ needs.publish-plan.outputs.dry_run }}
          MCPACE_NPM_DIST_TAG: ${{ needs.publish-plan.outputs.dist_tag }}
        run: |
          set -euo pipefail
          dry_run_args=()
          if [ "$MCPACE_PUBLISH_DRY_RUN" = "true" ]; then
            dry_run_args=(--dry-run)
          fi
          npm exec --yes --package=npm@11.13.0 -- npm publish "${dry_run_args[@]}" --access public --tag "$MCPACE_NPM_DIST_TAG" --provenance
