name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

jobs:
  source-validation:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
    env:
      MCPACE_BEARER_TOKEN: ci-placeholder-token
      MCPACE_ADMIN_PASSWORD_BCRYPT: $2b$10$1hLtpWUfeMNXxJBW9KWeneA5OClk.HQy5a1z/PHIcX0l6094xgrKq
    steps:
      - uses: actions/checkout@v4

      - name: Run Pester suite
        shell: pwsh
        run: ./tests/Invoke-TestSuite.ps1

      - name: Validate verification catalog loads
        shell: pwsh
        run: ./verify-manager.ps1 -ListScenarios | Out-Null

      - name: Build release bundle
        shell: pwsh
        run: ./build-release.ps1 -OutputDir dist
