name: ci

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  node-source-validation:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            node: '22'
          - os: ubuntu-latest
            node: '24'
          - os: windows-latest
            node: '24'
          - os: macos-latest
            node: '24'
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}

      - name: Run source and launcher tests
        run: npm test

  package-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Validate npm package dry-run
        run: npm run pack:npm:dry-run

  rust-build-validation:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0
          components: rustfmt, clippy

      - name: Run Rust tests
        run: cargo test

      - name: Build release binary
        run: cargo build --release

  launcher-fast-hosted:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os:
          - windows-latest
          - macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.95.0

      - name: Run targeted launcher smoke test
        run: cargo test --test hub_runtime hub_up_releases_captured_stdio_for_background_launcher -- --exact

  launcher-fast-ubuntu-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Run targeted launcher smoke test in Ubuntu Docker
        run: node scripts/verify-ubuntu-docker-fast.mjs --json

  launcher-e2e-ubuntu-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Run constrained Ubuntu Docker E2E smoke
        run: node scripts/verify-ubuntu-docker-e2e.mjs --json

  full-work-ubuntu-docker:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc

      - name: Run constrained Ubuntu Docker full-work verification
        run: node scripts/verify-ubuntu-docker-full.mjs --json
