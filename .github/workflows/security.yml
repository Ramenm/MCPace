name: security

# GitHub-hosted security jobs run on public pull requests, or on private repositories
# only when the matching MCPACE_ENABLE_PRIVATE_* repository variable is enabled.
# Manual dispatch stays available for explicit proof runs.
on:
  schedule:
    - cron: "17 4 * * 1"
  workflow_dispatch:
  pull_request:

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  dependency-review:
    if: github.event_name == 'pull_request' && (github.repository_visibility == 'public' || vars.MCPACE_ENABLE_PRIVATE_DEPENDENCY_REVIEW == 'true')
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0
        with:
          config-file: ./.github/dependency-review-config.yml

  codeql-javascript:
    if: github.repository_visibility == 'public' || vars.MCPACE_ENABLE_PRIVATE_CODEQL == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Initialize CodeQL for JavaScript
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          languages: javascript-typescript
          queries: security-extended

      - name: Analyze JavaScript
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          category: /language:javascript-typescript

  codeql-rust:
    if: github.repository_visibility == 'public' || vars.MCPACE_ENABLE_PRIVATE_CODEQL == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Initialize CodeQL for Rust
        uses: github/codeql-action/init@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          languages: rust
          queries: security-extended
          build-mode: none

      - name: Analyze Rust
        uses: github/codeql-action/analyze@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          category: /language:rust

  openssf-scorecard:
    if: (github.repository_visibility == 'public' || vars.MCPACE_ENABLE_PRIVATE_SCORECARD == 'true') && (github.event_name == 'pull_request' || github.ref_name == github.event.repository.default_branch)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      id-token: write
      security-events: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false

      - name: Run OpenSSF Scorecard
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: results.sarif
          results_format: sarif
          publish_results: ${{ github.repository_visibility == 'public' }}

      - name: Upload Scorecard SARIF
        uses: github/codeql-action/upload-sarif@99df26d4f13ea111d4ec1a7dddef6063f76b97e9  # v4
        with:
          sarif_file: results.sarif
