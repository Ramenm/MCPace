name: platform-proof

# Manual, explicit proof lane for the platforms users actually install on.
# Keep macOS pinned to explicit release images so GitHub's macos-latest label
# migration does not silently change the proof surface.
# It is intentionally separate from fast CI so private repositories do not
# spend macOS/Windows minutes on every push.
on:
  workflow_dispatch:
    inputs:
      full:
        description: Run Node 22 and 24 plus Rust native smoke on Linux/macOS ARM+Intel/Windows.
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: platform-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform-contract:
    name: platform contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund --omit=optional
      - run: npm run check:platform
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a  # v7
        if: always()
        with:
          name: platform-proof-report
          path: reports/platform-proof.*
          if-no-files-found: error

  node-contracts:
    name: node ${{ matrix.node }} / ${{ matrix.os }}
    if: ${{ inputs.full == true }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
        node: ['22', '24']
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund --omit=optional
      - run: npm run check
      - run: npm run check:package
      - run: npm run pack:npm:dry-run

  rust-native-smoke:
    name: rust native smoke / ${{ matrix.os }}
    if: ${{ inputs.full == true }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10  # v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: dtolnay/rust-toolchain@eac0f66a48bc4b70a10b9acd4c4e930f835d95ff # 1.95.0
        with:
          components: rustfmt, clippy
      - run: npm ci --ignore-scripts --no-audit --no-fund --omit=optional
      - run: npm run check:rust
      - run: cargo build --release --locked --bins
      - run: npm run platform:binary-smoke
      - name: Smoke isolated runtime lifecycle
        shell: bash
        run: |
          set -euo pipefail
          binary='target/release/mcpace'
          if [ "$RUNNER_OS" = 'Windows' ]; then binary+='.exe'; fi
          npm run check:installer-runtime-smoke -- --binary "$binary" --json
      - name: Prove disposable user-login lifecycle without reboot
        env:
          MCPACE_DISPOSABLE_AUTOSTART_PROOF: "1"
        shell: bash
        run: |
          set -euo pipefail
          binary='target/release/mcpace'
          if [ "$RUNNER_OS" = 'Windows' ]; then binary+='.exe'; fi
          args=(--binary "$binary" --json --confirm-disposable-user)
          if [ "$RUNNER_OS" = 'Linux' ]; then
            args+=(--allow-manager-skip)
          fi
          npm run proof:autostart -- "${args[@]}"
