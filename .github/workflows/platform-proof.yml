name: platform-proof

# Manual, explicit proof lane for the platforms users actually install on.
# Keep macOS pinned to explicit release images so GitHub's macos-latest label
# migration does not silently change the proof surface.
# It is intentionally separate from fast CI so private repositories do not
# spend macOS/Windows minutes on every push.
on:
  workflow_dispatch:
    inputs:
      full:
        description: Run Node 22 and 24 plus Rust native smoke on Linux/macOS ARM+Intel/Windows.
        required: false
        default: true
        type: boolean

permissions:
  contents: read

concurrency:
  group: platform-proof-${{ github.ref }}
  cancel-in-progress: true

jobs:
  platform-contract:
    name: platform contract
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run check:platform
      - uses: actions/upload-artifact@v7
        if: always()
        with:
          name: platform-proof-report
          path: reports/platform-proof.*
          if-no-files-found: error

  node-contracts:
    name: node ${{ matrix.node }} / ${{ matrix.os }}
    if: ${{ inputs.full == true }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, windows-latest]
        node: ['22', '24']
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run check
      - run: npm run check:package
      - run: npm run pack:npm:dry-run

  rust-native-smoke:
    name: rust native smoke / ${{ matrix.os }}
    if: ${{ inputs.full == true }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 35
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15, macos-15-intel, windows-latest]
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false
      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm
      - uses: dtolnay/rust-toolchain@1.95.0
        with:
          components: rustfmt, clippy
      - run: npm ci --ignore-scripts --no-audit --no-fund
      - run: npm run check:rust
      - run: cargo build --release
      - run: npm run platform:binary-smoke
