name: release-artifacts

# Release artifact builds are manual-only in the no-paid-runner posture. Push tag
# automation can be restored when GitHub Actions billing or a trusted
# self-hosted runner is configured.
on:
  workflow_dispatch:
    inputs:
      create_github_release:
        description: Create or update a draft GitHub Release from the built assets.
        required: false
        default: false
        type: boolean
      release_tag:
        description: Tag to use when create_github_release is true on a manual run.
        required: false
        default: ''
        type: string

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  source-release:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      attestations: write
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version-file: .nvmrc
          cache: npm

      - uses: dtolnay/rust-toolchain@1.95.0

      - name: Install locked Node tooling
        run: npm ci --ignore-scripts --no-audit --no-fund

      - name: Verify release contracts
        run: npm run check:ci

      - name: Build source release artifact bundle
        run: npm run build:release-artifacts

      - name: Upload source release artifacts
        uses: actions/upload-artifact@v7
        with:
          name: source-release
          path: dist/**

  github-draft-release:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    needs: source-release
    if: github.ref_type == 'tag' || (github.event_name == 'workflow_dispatch' && inputs.create_github_release == true)
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v8
        with:
          path: dist/release-assets

      - name: Create or update draft GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ github.ref_type == 'tag' && github.ref_name || inputs.release_tag }}
        run: |
          shopt -s nullglob
          if [ -z "$RELEASE_TAG" ]; then
            echo "release_tag input is required for manual draft release creation outside a tag ref" >&2
            exit 1
          fi
          assets=(dist/release-assets/**/*)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "no release assets found" >&2
            exit 1
          fi
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" "${assets[@]}" --clobber
          else
            gh release create "$RELEASE_TAG" "${assets[@]}" --draft --verify-tag --title "$RELEASE_TAG" --notes "Automated MCPace release assets. Verify checksums before publishing."
          fi
