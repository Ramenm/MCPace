[extend]
useDefault = true

# Repository-specific Gitleaks allowlist.
# The default generic-api-key rule can mistake public release target IDs
# such as win32-x64-msvc for secrets when they are stored in fields named `key`.
[allowlist]
description = "Public platform target keys used for release matrix metadata."
condition = "AND"
regexTarget = "line"
regexes = [
  '''(?i)(?:-\s*)?key:\s+(win32-(?:x64|arm64)-msvc)''',
  '''(?i)(?:"key":\s+"|entry\.key\s*===\s*['"])(win32-(?:x64|arm64)-msvc)''',
]
paths = [
  '''(^|/)(?:\.github/workflows/publish-npm\.yml|packages/npm/cli/lib/targets\.js|packages/npm/cli/test/platform\.test\.mjs|packages/npm/cli/release-targets\.json|release-targets\.json|reports/platform-proof\.json)$''',
]
